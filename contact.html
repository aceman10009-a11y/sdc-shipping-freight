<!-- HEADER / NAV -->
<header class="navbar">
    <div class="logo">
        <img src="images/logo.JPG" alt="SDC Logo">

        <h1 data-i18n="layout.navbar.brand">
            SDC Shipping Freight
        </h1>
    </div>

    <nav>
        <a href="index.html" data-i18n="common.navigation.home">Home</a>

        <a href="services.html" data-i18n="common.navigation.services">Services</a>

        <a href="about.html" data-i18n="common.navigation.about">About Us</a>

        <a href="contact.html" data-i18n="common.navigation.contact">Contact</a>
    </nav>
</header>

<!-- CONTACT SECTION -->
<section class="section contact">

    <h2 data-i18n="contact.title">
        Contact Us
    </h2>

    <p>
        <strong>Email:</strong>
        contact@sdcshippingfreight.com
    </p>

    <div class="contact-item">

        <a href="viber://chat?number=%2B17329168175" target="_blank">

            <i class="fab fa-viber" style="color:#7360f2;"></i>

            <span>

                <strong data-i18n="contact.information.viber">
                    Viber
                </strong>

                : +1 732 916 8175

            </span>

        </a>

    </div>

    <div class="contact-form">

        <input
            type="text"
            data-i18n-placeholder="contact.form.name"
            placeholder="">

        <input
            type="email"
            data-i18n-placeholder="contact.form.email"
            placeholder="">

        <textarea
            data-i18n-placeholder="contact.form.message"
            placeholder=""></textarea>

        <button data-i18n="contact.form.button">
            Send Message
        </button>

    </div>

</section>

<!-- FOOTER -->
<footer class="footer">

    <p data-i18n="layout.footer.copyright">
        © 2014–2026 SDC Shipping Freight. All rights reserved.
    </p>

</footer>
